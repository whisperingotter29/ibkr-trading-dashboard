<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBKR Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080f;--sf:#0e0e18;--sf2:#141422;--sf3:#1a1a2e;--pr:#00d4aa;--prd:rgba(0,212,170,.12);--dn:#e63946;--dnd:rgba(230,57,70,.12);--wn:#f4a223;--tx:#e0e0e5;--td:#6b6b80;--bd:#1a1a2e;--mono:'JetBrains Mono',monospace;--disp:'Space Grotesk',sans-serif;--body:'Source Sans 3',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:var(--body);font-size:15px;line-height:1.5;overflow:hidden}
.app{display:grid;grid-template-columns:260px 1fr 280px;grid-template-rows:52px 1fr;height:100vh;gap:1px;background:var(--bd)}
.topbar{grid-column:1/-1;background:var(--sf);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.sidebar{background:var(--sf);overflow-y:auto;padding:14px}
.main{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.panel{background:var(--sf);overflow-y:auto;padding:14px}
.logo{font-family:var(--disp);font-size:15px;font-weight:700;color:var(--pr);letter-spacing:-.02em}
.logo span{color:var(--td);font-weight:400}
.sb-title{font-family:var(--disp);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--td);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.sb-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.sb-label{font-family:var(--mono);font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.08em}
.sb-val{font-family:var(--mono);font-size:13px;font-weight:600}
.cfg-label{font-family:var(--mono);font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.cfg-input{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--mono);font-size:12px;padding:6px 8px;outline:none;appearance:none}
.cfg-input:focus{border-color:var(--pr)}
.btn{font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:7px 14px;border:none;cursor:pointer;transition:all .2s}
.btn-pr{background:var(--pr);color:var(--bg)}
.btn-pr:hover{background:#00b894}
.btn-ol{background:transparent;border:1px solid var(--bd);color:var(--td)}
.btn-ol:hover{border-color:var(--pr);color:var(--pr)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-bar{padding:10px 16px;border-top:1px solid var(--bd);background:var(--sf);display:flex;gap:8px}
.chat-in{flex:1;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--mono);font-size:13px;padding:9px 12px;outline:none}
.chat-in:focus{border-color:var(--pr)}
.chat-in::placeholder{color:var(--td)}
.msg{max-width:88%;padding:10px 14px;font-size:13px;line-height:1.6}
.msg-u{align-self:flex-end;background:var(--prd);border:1px solid rgba(0,212,170,.2);font-family:var(--mono)}
.msg-a{align-self:flex-start;background:var(--sf2);border:1px solid var(--bd)}
.msg-s{align-self:center;background:var(--sf3);border:1px solid var(--bd);color:var(--td);font-family:var(--mono);font-size:11px;padding:6px 14px}
.msg-tag{font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.msg pre{font-family:var(--mono);font-size:12px;white-space:pre-wrap;margin-top:6px;padding:8px;background:rgba(0,0,0,.3);overflow-x:auto}
.log-e{padding:6px 0;border-bottom:1px solid rgba(20,20,34,.5);font-size:11px}
.log-t{font-family:var(--mono);font-size:10px;color:var(--td)}
.log-m{font-family:var(--mono);margin-top:2px}
.log-ok{color:var(--pr)}.log-er{color:var(--dn)}.log-in{color:var(--td)}.log-wn{color:var(--wn)}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:10px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--wn);box-shadow:0 0 8px rgba(244,162,35,.5)}
.loading{display:inline-block;width:14px;height:14px;border:2px solid var(--sf3);border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--sf)}::-webkit-scrollbar-thumb{background:var(--sf3)}
@media(max-width:900px){.app{grid-template-columns:1fr;grid-template-rows:52px 200px 1fr 160px}.sidebar,.panel{max-height:200px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">IBKR <span>//</span> COMMAND CENTER</div>
    <div style="display:flex;align-items:center;gap:14px">
      <a href="index.html" style="color:var(--td);text-decoration:none;font-family:var(--disp);font-size:11px;letter-spacing:.05em;text-transform:uppercase">Dashboard</a>
      <div style="display:flex;align-items:center;gap:6px"><div class="dot"></div>
      <span style="font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--wn)">PAPER TRADING</span></div>
    </div>
  </div>

  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="chat-msgs" id="chat"></div>
    <div class="chat-bar">
      <input class="chat-in" id="input" placeholder="Type a command..." onkeydown="if(event.key==='Enter')send()">
      <button class="btn btn-pr" id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
  <div class="panel"><div class="sb-title">Activity Log</div><div id="log"></div></div>
</div>

<script>
const API_URL = '/api/chat';
let history = [];
let busy = false;
let acct = { nlv:'--', cash:'--', bp:'--', margin:'--', dt:'--' };
let positions = [];
const cfg = { symbol:'MES', maxQty:1, strategy:'momentum', maxLoss:100 };

// ── Render Sidebar ──
function renderSidebar() {
  document.getElementById('sidebar').innerHTML = `
    <div style="margin-bottom:20px">
      <div class="sb-title">Account</div>
      <div class="sb-row"><span class="sb-label">NLV</span><span class="sb-val" style="color:var(--pr)">${acct.nlv}</span></div>
      <div class="sb-row"><span class="sb-label">Cash</span><span class="sb-val">${acct.cash}</span></div>
      <div class="sb-row"><span class="sb-label">Buying Pwr</span><span class="sb-val">${acct.bp}</span></div>
      <div class="sb-row"><span class="sb-label">Margin</span><span class="sb-val">${acct.margin}</span></div>
      <div class="sb-row"><span class="sb-label">Day Trades</span><span class="sb-val">${acct.dt}</span></div>
      <button class="btn btn-ol" style="width:100%;margin-top:8px" onclick="qk('Get my account summary with NLV, cash, buying power, margin, day trades. Also get my open positions.')" ${busy?'disabled':''}>Refresh</button>
    </div>
    <div style="margin-bottom:20px">
      <div class="sb-title">Positions</div>
      ${positions.length===0?'<div style="font-family:var(--mono);font-size:11px;color:var(--td)">No open positions</div>':
        positions.map(p=>`<div style="padding:5px 0;border-bottom:1px solid var(--sf2)">
          <div style="display:flex;justify-content:space-between">
            <span style="font-family:var(--mono);font-size:11px;font-weight:600;color:var(--pr)">${p.contract_description||'N/A'}</span>
            <span style="font-family:var(--mono);font-size:11px;font-weight:600;color:${p.unrealized_pnl>=0?'var(--pr)':'var(--dn)'}">${p.unrealized_pnl>=0?'+':''}$${Number(p.unrealized_pnl).toFixed(2)}</span>
          </div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--td)">Qty:${p.position} @ $${Number(p.market_price).toFixed(2)}</div>
        </div>`).join('')}
    </div>
    <div style="margin-bottom:20px">
      <div class="sb-title">Strategy Config</div>
      <div style="margin-bottom:8px"><div class="cfg-label">Symbol</div><input class="cfg-input" value="${cfg.symbol}" onchange="cfg.symbol=this.value"></div>
      <div style="margin-bottom:8px"><div class="cfg-label">Max Contracts</div><input class="cfg-input" type="number" value="${cfg.maxQty}" min="1" max="5" onchange="cfg.maxQty=+this.value"></div>
      <div style="margin-bottom:8px"><div class="cfg-label">Strategy</div>
        <select class="cfg-input" onchange="cfg.strategy=this.value">
          <option ${cfg.strategy==='momentum'?'selected':''}>momentum</option>
          <option ${cfg.strategy==='mean_reversion'?'selected':''}>mean_reversion</option>
          <option ${cfg.strategy==='breakout'?'selected':''}>breakout</option>
          <option ${cfg.strategy==='smc_ict'?'selected':''}>smc_ict</option>
          <option ${cfg.strategy==='custom'?'selected':''}>custom</option>
        </select>
      </div>
      <div style="margin-bottom:8px"><div class="cfg-label">Max Daily Loss $</div><input class="cfg-input" type="number" value="${cfg.maxLoss}" min="10" onchange="cfg.maxLoss=+this.value"></div>
    </div>
    <div>
      <div class="sb-title">Quick Actions</div>
      <div class="quick">
        <button class="btn btn-ol" style="font-size:10px;padding:5px" onclick="qk('Get my account summary')" ${busy?'disabled':''}>Acct</button>
        <button class="btn btn-ol" style="font-size:10px;padding:5px" onclick="qk('Show my open positions with P&L')" ${busy?'disabled':''}>Positions</button>
        <button class="btn btn-ol" style="font-size:10px;padding:5px" onclick="qk('Get real-time price snapshot for '+cfg.symbol+' futures on CME with bid-ask, last, volume, change')" ${busy?'disabled':''}>Price</button>
        <button class="btn btn-ol" style="font-size:10px;padding:5px" onclick="qk('Show my trades from today')" ${busy?'disabled':''}>Trades</button>
        <button class="btn btn-ol" style="font-size:10px;padding:5px" onclick="qk('Get daily price history for '+cfg.symbol+' on CME, one month')" ${busy?'disabled':''}>History</button>
        <button class="btn btn-ol" style="font-size:10px;padding:5px" onclick="qk('Show my live orders')" ${busy?'disabled':''}>Orders</button>
      </div>
    </div>`;
}

// ── Chat ──
function addMsg(content, type) {
  const el = document.createElement('div');
  el.className = 'msg msg-' + type[0];
  if (type === 'system') { el.textContent = content; }
  else {
    el.innerHTML = '<div class="msg-tag" style="color:'+(type==='user'?'var(--td)':'var(--pr)')+'">'+(type==='user'?'You':'Agent')+'</div>'
      + '<div style="white-space:pre-wrap;word-break:break-word">' + esc(content) + '</div>';
  }
  document.getElementById('chat').appendChild(el);
  document.getElementById('chat').scrollTop = 99999;
}

function addLoading() {
  const el = document.createElement('div');
  el.className = 'msg msg-a'; el.id = 'loadMsg';
  el.innerHTML = '<div class="msg-tag" style="color:var(--pr)">Agent</div><div class="loading"></div> <span style="font-size:12px;color:var(--td);animation:pulse 2s ease-in-out infinite">Processing via IBKR MCP...</span>';
  document.getElementById('chat').appendChild(el);
  document.getElementById('chat').scrollTop = 99999;
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s;
  return d.innerHTML.replace(/\n/g, '<br>');
}

function log(text, type) {
  const el = document.createElement('div'); el.className = 'log-e';
  el.innerHTML = '<div class="log-t">' + new Date().toLocaleTimeString() + '</div><div class="log-m log-' + type + '">' + text + '</div>';
  const lg = document.getElementById('log');
  lg.insertBefore(el, lg.firstChild);
}

// ── API Call ──
async function callAgent(userMsg) {
  const sys = `You are an IBKR trading assistant in PAPER TRADING mode with MCP access to the user's account.
RULES:
- PAPER TRADING only
- For orders, show details and ask confirmation first
- Use create_order_instruction (saved instructions, not direct execution)
- Keep responses concise, data-focused, plain text
- Format numbers with $ signs
Config: Symbol=${cfg.symbol}, MaxQty=${cfg.maxQty}, Strategy=${cfg.strategy}, MaxLoss=$${cfg.maxLoss}`;

  history.push({ role: 'user', content: userMsg });

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: sys,
        messages: history.slice(-10),
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const texts = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text);
    const tools = (data.content||[]).filter(b=>b.type==='mcp_tool_use').map(b=>b.name);
    const results = (data.content||[]).filter(b=>b.type==='mcp_tool_result').map(b=>{try{return b.content?.[0]?.text||''}catch{return''}});

    if (tools.length) log('MCP: ' + tools.join(', '), 'in');

    // Extract account data
    results.forEach(r => { try {
      const p = JSON.parse(r);
      if (p.net_liquidation !== undefined) {
        acct.nlv = '$' + Number(p.net_liquidation).toLocaleString('en-US',{minimumFractionDigits:2});
        acct.cash = '$' + Number(p.total_cash_value||0).toLocaleString('en-US',{minimumFractionDigits:2});
        acct.bp = '$' + Number(p.buying_power||0).toLocaleString('en-US',{minimumFractionDigits:0});
        acct.margin = '$' + Number(p.maintenance_margin||0).toFixed(0);
        acct.dt = p.day_trades_remaining || '--';
        renderSidebar();
      }
      if (p.positions) { positions = p.positions.filter(x=>x.position!==0); renderSidebar(); }
    } catch{} });

    let text = texts.join('\n\n');
    if (!text && results.length) text = results.map(r=>{try{return JSON.stringify(JSON.parse(r),null,2)}catch{return r}}).join('\n\n');

    history.push({ role: 'assistant', content: text || 'No response.' });
    return text || 'No response received.';
  } catch (err) {
    log('Error: ' + err.message, 'er');
    return 'Error: ' + err.message + '\n\nIf you see "ANTHROPIC_API_KEY not set", add it in your Vercel project settings under Environment Variables.';
  }
}

// ── Send ──
async function send(override) {
  const text = override || document.getElementById('input').value.trim();
  if (!text || busy) return;
  document.getElementById('input').value = '';
  busy = true;
  document.getElementById('sendBtn').disabled = true;
  renderSidebar();

  addMsg(text, 'user');
  log('Command: ' + text, 'in');
  addLoading();

  const response = await callAgent(text);

  const lm = document.getElementById('loadMsg'); if (lm) lm.remove();
  addMsg(response, 'agent');
  log('Response received', 'ok');

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  renderSidebar();
  document.getElementById('input').focus();
}

function qk(t) { send(t); }

// ── Init ──
renderSidebar();
addMsg('IBKR Command Center initialized. Paper trading mode active.', 'system');
addMsg('Ready. Click Refresh to load your account data, or type a command below.\n\nExamples:\n  Get my account summary\n  What\'s the current price of MES?\n  Show my trades from today\n  Analyze MES for a breakout setup\n  Create a buy order instruction for 1 MES\n\nAll order instructions require your approval.', 'agent');
log('System initialized. Paper mode.', 'in');
</script>
</body>
</html>
